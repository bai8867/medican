# 仅用于 AdminRecipeController PATCH 契约切片：提供内存库以初始化 MyBatis-Plus TableInfo（lambda 列解析），不执行 schema/data 初始化。
spring:
  datasource:
    url: jdbc:h2:mem:admin_recipe_patch_contract;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=USER
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:db/admin-recipe-patch-contract-schema.sql
