# 演示用：将告警 POST 到 httpbin。生产请改为钉钉/飞书/企业微信 Webhook 或邮件。
global:
  resolve_timeout: 5m

route:
  receiver: demo-webhook
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: demo-webhook
    webhook_configs:
      - url: https://httpbin.org/post
        send_resolved: false
