global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: campus-diet-backend
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:11888
